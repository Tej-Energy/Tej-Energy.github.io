backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "site_content"
    label: "Website Content"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "index.html"
        fields:
          - {label: "Raw HTML", name: "body", widget: "code", default_language: "html"}
